<!doctype html>
<html lang="bn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>সোনালী হাট - সরাসরি কৃষকের কাছ থেকে কিনুন</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="home-body">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">

      <a href="index.html" class="logo">
        <i class="fa-solid fa-wheat-awn"></i> সোনালী হাট
      </a>

      <div class="search-bar">
        <input id="search-input" type="text" placeholder="পণ্য বা জেলার নাম দিয়ে খুঁজুন..." />
        <button type="submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>

      <div class="nav-links">
        <a href="#">
          <i class="fa-solid fa-cart-shopping"></i> কার্ট
          <span class="cart-count">0</span>
        </a>

        <a href="auth.html" class="btn-login">লগইন / সাইন-আপ</a>
      </div>

    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-section">
    <div class="hero-content">
      <h1>কৃষকের হাসি, ক্রেতার স্বস্তি</h1>
      <p>
        মধ্যস্বত্বভোগী ছাড়াই সরাসরি মাঠ থেকে সতেজ কৃষিপণ্য কিনুন।
      </p>
      <a href="#products" class="btn-shop-now">
        পণ্য দেখুন <i class="fa-solid fa-arrow-down"></i>
      </a>
    </div>
  </section>

  <!-- Products Section -->
  <main class="main-products" id="products">

    <div class="section-title">
      <h2><i class="fa-solid fa-leaf"></i> সদ্য যুক্ত হওয়া পণ্য</h2>
    </div>

    <!-- FILTER (still UI only for now) -->
    <div class="product-filters">
      <div class="filter-group">
        <label>ক্যাটেগরি</label>
        <select id="category-filter">
          <option value="all">সব</option>
          <option value="সবজি">সবজি</option>
          <option value="ফল">ফল</option>
          <option value="শস্য">শস্য</option>
          <option value="মসলা">মসলা</option>
          <option value="দুধজাত">দুধজাত</option>
        </select>
      </div>
    </div>

    <!-- 🔥 FIREBASE PRODUCT GRID -->
    <div class="product-grid" id="productGrid"></div>

    <!-- NO RESULT MESSAGE -->
    <p class="no-results" style="display:none; text-align:center; margin-top:20px;">
      কোনো পণ্য পাওয়া যায়নি
    </p>

  </main>

  <!-- Firebase Index Script -->
  <script type="module" src="js/index.js"></script>

</body>

</html>
